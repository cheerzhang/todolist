<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f1e9">
  <title>我的清单</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">MY DAY</p>
        <h1>我的清单</h1>
        <p class="date" id="date"></p>
      </div>
      <span class="mode" id="mode">读取中</span>
    </header>

    <section class="summary" aria-label="任务概览">
      <div><strong id="leftCount">0</strong><span>件待完成</span></div>
      <div class="progress"><i id="progressBar"></i></div>
      <span id="percent">0%</span>
    </section>

    <div id="sections" class="sections" aria-live="polite"></div>

    <button class="add-section editor-only" id="addSection" type="button">＋ 新建分区</button>
    <div class="device-actions" id="deviceActions" hidden>
      <p id="deviceHint">这是线上公共清单，默认只读。</p>
      <button class="primary" id="enableDeviceEdit" type="button">在此设备编辑</button>
      <button id="exportData" type="button" hidden>导出 JSON</button>
      <button id="resetDevice" type="button" hidden>恢复线上版本</button>
    </div>
  </main>

  <div class="toast" id="toast" role="status"></div>
  <script src="./app.js"></script>
</body>
</html>
